[env:gy271service]
build_src_filter = -<*.cpp> +<variables/setget.cpp> +<task_safe_wire.cpp> +<expander.cpp> +<sensors/GY271.cpp> +<sensors/gy271_service.cpp> +<z_main_gy271_service.cpp>
; PlatformIO Project Configuration File
;
; Keep the main file focused on the actively used environments.
; The VS Code PlatformIO extension appears to truncate or break on larger
; environment lists in this project. Additional environments live in
; `platformio_optional.ini` and can be enabled by copying sections back here
; if needed.
;
; https://docs.platformio.org/page/projectconf.html

[platformio]
build_dir = .pio-build

[env]
platform = espressif32@3.5.0
board = esp32dev
framework = arduino
extra_scripts =
  pre:tools/pio_retry_archives.py
build_flags = 
monitor_speed = 57600

[env:maptest]
build_src_filter = -<*.cpp> +<navigation/*.cpp> +<z_main_map.cpp>

[env:usensor]
build_src_filter = -<*.cpp> +<z_main_usensor.cpp> +<variables/*.cpp> +<sensors/usensor.cpp>
	
[env:motor]
build_src_filter = -<*.cpp> +<z_main_motor.cpp> +<actuators/motor.cpp> +<config.cpp>

[env:config]
build_src_filter = -<*.cpp> +<z_main_config.cpp> +<config.cpp> +<logger.cpp>
lib_deps = ricaun/ArduinoUniqueID@^1.3.0

[env:steer]
build_src_filter = -<*.cpp> +<config.cpp> +<actuators/steer.cpp> +<z_main_steer.cpp> +<actuators/motor.cpp> +<variables/setget.cpp>

[env:hwtest]
build_src_filter = -<*.cpp> +<variables/setget.cpp> +<task_safe_wire.cpp> +<expander.cpp> +<lights/light_service.cpp> +<fusion/clearance_fusion.cpp> +<fusion/fusion_service.cpp> +<sensors/accsensorkalman.cpp> +<sensors/kalman_filter.cpp> +<z_main_hw-test.cpp> +<sensors/usensor.cpp> +<actuators/steer.cpp> +<actuators/motor.cpp> +<config.cpp>

[env:frontavoid]
build_src_filter = -<*.cpp> +<variables/setget.cpp> +<task_safe_wire.cpp> +<expander.cpp> +<lights/light_service.cpp> +<sensors/usensor.cpp> +<sensors/accsensor.cpp> +<sensors/vl53l0x_basic.cpp> +<sensors/front_vl53l0x_service.cpp> +<fusion/clearance_fusion.cpp> +<fusion/fusion_service.cpp> +<robots/driver.cpp> +<actuators/steer.cpp> +<actuators/motor.cpp> +<config.cpp> +<z_main_front_avoid.cpp>

[env:exploremap]
build_src_filter = -<*.cpp> +<variables/setget.cpp> +<task_safe_wire.cpp> +<expander.cpp> +<lights/light_service.cpp> +<sensors/usensor.cpp> +<sensors/accsensor.cpp> +<sensors/vl53l0x_basic.cpp> +<sensors/front_vl53l0x_service.cpp> +<fusion/clearance_fusion.cpp> +<fusion/fusion_service.cpp> +<actuators/steer.cpp> +<actuators/motor.cpp> +<config.cpp> +<navigation/grid_map.cpp> +<navigation/observed_explorer.cpp> +<basic_telemetry/basic_logger.cpp> +<basic_telemetry/explore_web_server.cpp> +<z_main_explore_map.cpp>

[env:driver]
build_src_filter = -<*.cpp> +<robots/driver.cpp> +<variables/setget.cpp>

[env:i2cscan]
build_src_filter = -<*.cpp> +<config.cpp> +<task_safe_wire.cpp> +<z_main_i2cscan.cpp>

[env:expander]
build_src_filter = -<*.cpp> +<variables/setget.cpp> +<task_safe_wire.cpp> +<expander.cpp> +<z_main_expander.cpp>

[env:accsensor]
build_flags =
lib_archive = no
build_src_filter = -<*.cpp> +<config.cpp> +<sensors/accsensor.cpp> +<variables/setget.cpp> +<task_safe_wire.cpp> +<z_main_accsensor.cpp>

[env:accsensorcalibration]
build_src_filter = -<*.cpp> +<config.cpp> +<task_safe_wire.cpp> +<z_main_accsensorcalibration.cpp>
lib_deps =
	ricaun/ArduinoUniqueID@^1.3.0

[env:ioexpandertest]
build_src_filter = -<*.cpp> +<task_safe_wire.cpp> +<z_main_23017_test.cpp>

[env:pca9685test]
build_src_filter = -<*.cpp> +<task_safe_wire.cpp> +<expander.cpp> +<z_main_pca9685_test.cpp>

[env:vl53l0xmuxtest]
build_src_filter = -<*.cpp> +<task_safe_wire.cpp> +<expander.cpp> +<sensors/vl53l0x_basic.cpp> +<z_main_vl53l0x_mux_test.cpp>

[env:vl53l5cxmuxtest]
build_src_filter = -<*.cpp> -<*.c> +<task_safe_wire.cpp> +<expander.cpp> +<sensors/vl53l5cx_basic.cpp> +<sensors/vl53l5cx_uld/vl53l5cx_api.c> +<sensors/vl53l5cx_uld/platform.c> +<z_main_vl53l5cx_mux_test.cpp>

[env:vl53l5cxstraw]
build_src_filter = -<*.cpp> -<*.c> +<sensors/vl53l5cx_uld/vl53l5cx_api.c> +<sensors/vl53l5cx_uld/platform.c> +<z_main_vl53l5cx_mux_st_raw.cpp>

[env:vl53l5cxstverify]
build_src_filter = -<*.cpp> -<*.c> +<sensors/vl53l5cx_uld_verify/vl53l5cx_api.c> +<sensors/vl53l5cx_uld_verify/platform.c> +<z_main_vl53l5cx_mux_st_verify.cpp>

[env:accsensorkalman]
build_src_filter = -<*.cpp> +<config.cpp> +<sensors/accsensorkalman.cpp> +<sensors/kalman_filter.cpp> +<variables/setget.cpp> +<task_safe_wire.cpp> +<z_main_accsensor_kalman.cpp>

[env:basictelemetry]
build_flags =
build_src_filter = -<*.cpp> +<config.cpp> +<secrets.cpp> +<variables/setget.cpp> +<task_safe_wire.cpp> +<basic_telemetry/basic_logger.cpp> +<basic_telemetry/basic_web_server.cpp> +<fusion/clearance_fusion.cpp> +<fusion/fusion_service.cpp> +<sensors/accsensor.cpp> +<sensors/usensor.cpp> +<z_main_basic_telemetry.cpp>

[env:basictelemetrymin]
build_flags =
build_src_filter = -<*.cpp> +<secrets.cpp> +<variables/setget.cpp> +<basic_telemetry/basic_logger.cpp> +<basic_telemetry/basic_web_server.cpp> +<z_main_basic_telemetry_min.cpp>
